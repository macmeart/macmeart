<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACMEART</title>

    <link rel="stylesheet" href="./style/main-styles.css">
    <link rel="stylesheet" href="./style/gallery-styles.css">
    <link rel="stylesheet" href="./style/popups-and-modals.css">
    <link rel="stylesheet" href="./style/contact.css">
    <link rel="stylesheet" href="./style/grid-elements.css">
    <script src="./javascript/gallery.js"></script>
    <link rel="icon" type="icon" href="./pictures/favicon(2).ico">

    <link rel="stylesheet" href="./style/responsive-styles.css">
</head>

<body>
    <a id="freccia" onclick="this.classList.remove('show')" class="popup freccia hidden" href="#gallery"></a>
    <header>
        <a id="instagram" href="https://www.instagram.com/macmeart" target="_blank" rel="noopener noreferrer"><img
                src="./pictures/Instagram_logo_2016.png" alt=""></a>
        <span class="macmeart" onclick="window.location.hash = 'intro-page'">MACMEART</span>
        <span class="lang-container"><span class="mini-lang mini-ita" onclick="changeLanguage('ita')">ITA</span> | <span
                class="mini-lang mini-eng" onclick="changeLanguage('eng')">ENG</span></span>
    </header>
    <section id="intro-page" class="intro-page">
        <section class="intro__info">
            <p class="italiano language-not-selected">Macmeart è un artista italiano.</p>
            <p class="english">Macmeart is an italian artist</p>
        </section>
        <section class="intro__picture-container">
            <img src="./pictures/profile.jpg" alt="">
        </section>
    </section>
    <h1 id="gallery-title" class="gallery title"><span>GALLERY</span></h1>
    <section id="gallery" class="gallery">
        <div data-titolo="titolo" data-anno="2021" data-dimensioni="100cm x 100cm" class="picture-container one"
            data-descrizione-english="descrizione" data-misure="100 x 100">
            <img src="./pictures/picture_1.jpg" alt="" class="picture one">
        </div>
        <div class="picture-container two" data-titolo="The last supper" data-anno="2021"
            data-dimensioni="100cm x 100cm"
            data-descrizione-english="The world does not change with words. Man does not change with words. Politicians, big companies, States, hide their real &quot;to be&quot; behind a mask of &quot;to have&quot;. Search for power, vanity, selfishness, violence, greed, are hidden behind the mask.
            I use materials and techniques already seen in the artworks of important Italian artists of the previous century (i.e. Emilio Vedova) combined with original expedients (such as the use of the anagram) to sarcastically express the hypocrisy that is carrying human being to its self-destruction.
            &quot;The Last Supper (masquerade)&quot; shows a Minjun Christ laughing in front of human misery and all its false values."
            data-descrizione-italiano="Il mondo non cambia a parole. L'uomo non cambia a parole. I politici, le multinazionali, gli stati nascondono il loro vero &quot;essere&quot; dietro una maschera di &quot;avere&quot;. La ricerca del potere, la vanità, l'egoismo, la violenza, l'avarizia sono nascoste dietro la maschera.
            Uso materiali e tecniche già viste nei lavori di importanti artisti italaini del secolo scroso (i.e. Emilio Vedova) combinati ad originali espedienti (come l'uso di anagrammi) per esprimere sarcasticamente l'ipocrisia che sta trascinando l'essere umano alla sua autodistruzione. &quot;The Last Supper (masquerade)&quot;
            mostra un Cristo di Minjun che ride davanti all'umana miseria e a tutti i suoi falsi valori."
            data-misure="100 x 50">
            <img src="./pictures/picture_2.jpg" alt="" class="picture two">
        </div>
        <div data-titolo="titolo" data-anno="2021" data-dimensioni="100cm x 100cm" class="picture-container three"
            data-descrizione-english="descrizione" data-misure="100 x 100">
            <img src="./pictures/picture_3.jpg" alt="" class="picture three" data-descrizione-english="descrizione"
                data-misure="100 x 100">
        </div>
        <div data-titolo="titolo" data-anno="2021" data-dimensioni="100cm x 100cm" class="picture-container four"
            data-descrizione-english="descrizione" data-misure="100 x 100">
            <img src="./pictures/picture_4.jpg" alt="" class="picture four">
        </div>
        <div data-titolo="titolo" data-anno="2021" data-dimensioni="100cm x 100cm" class="picture-container five"
            data-descrizione-english="descrizione" data-misure="100 x 100">
            <img src="./pictures/picture_5.jpeg" alt="" class="picture five">
        </div>
        <div data-titolo="titolorertwrtrwvteweverv re trewervte" data-anno="2021" data-dimensioni="100cm x 100cm"
            class="picture-container six" data-descrizione-english="descrizione" data-misure="100 x 100">
            <img src="./pictures/picture_6.jpeg" alt="" class="picture six">
        </div>
        <div data-titolo="titolo asfdfdfdasfds fasdfdsfdsadsafdsf" data-anno="2021" data-dimensioni="100cm x 100cm"
            class="picture-container seven" data-descrizione-english="descrizione" data-misure="100 x 100">
            <img src="./pictures/picture_7.jpeg" alt="" class="picture seven">
        </div>
    </section>

    <section id="contact" class="contact">
        <span class="email">macmeart@artist.art</span>
    </section>

    <div class="picture-modal" id="dettaglio">
        <div class="picture-modal__picture-container">
            <img class="big-picture" src="" alt="">
            <div class="mini-pictures-container">
            </div>
        </div>
        <div class="picture-modal__description picture-modal__info" onclick="event.stopPropagation()">
            <p>Ci sono dei problemi con il caricamento della descrizione.</p>
        </div>

        <div id="x" onclick="document.querySelector('.picture-modal').classList.remove('appear-modal');
            document.body.classList.remove('appear-modal');
            event.stopPropagation();">
        </div>
    </div>
</body>

</html>
